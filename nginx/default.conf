upstream variance_legacy {
    zone variance_legacy 64k;
    server variance-web:80 resolve;
}

upstream variance_admin {
    zone variance_admin 64k;
    server laravel:9000 resolve;
}

upstream variance_medite {
    zone variance_medite 64k;
    server medite:5000 resolve;
}

map $http_x_forwarded_proto $proxy_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
}

resolver 127.0.0.11 valid=10s;
resolver_timeout 5s;

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 50m;

    location / {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
        proxy_pass http://variance_legacy;
    }

    location /build/ {
        alias /var/www/html/public/build/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    location /admin/build/ {
        alias /var/www/html/public/build/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    location /js/ {
        alias /var/www/html/public/js/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    location /admin/js/ {
        alias /var/www/html/public/js/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    location /images/ {
        alias /var/www/html/public/images/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    location /admin/images/ {
        alias /var/www/html/public/images/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    location /storage/ {
        alias /var/www/html/storage/app/public/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    location /admin/storage/ {
        alias /var/www/html/storage/app/public/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    location = /health {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI /health;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $proxy_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $server_port;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 600;
        fastcgi_pass variance_admin;
    }

    location = /admin {
        return 301 $scheme://$http_host/admin/;
    }

    location /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $uri$is_args$args;
        fastcgi_param DOCUMENT_URI $uri;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $proxy_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $server_port;
        fastcgi_param HTTP_X_FORWARDED_PREFIX /admin;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 600;
        fastcgi_pass variance_admin;
    }

    location = /medite {
        return 301 $scheme://$http_host/medite/;
    }

    location /medite/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /medite;
        proxy_redirect off;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 600;
        send_timeout 600;
        proxy_pass http://variance_medite/;
    }
}

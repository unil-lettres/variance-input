services:
  mariadb:
    image: mariadb:11.5.2
    restart: unless-stopped
    env_file:
      - ./variance/.env
    volumes:
      - ./var/dbdata:/var/lib/mysql

  redis:
    image: redis:7.0
    restart: unless-stopped

  laravel:
    image: unillett/variance-input:laravel-stage-latest
    restart: unless-stopped
    env_file:
      - ./laravel.env
    environment:
      - PHP_MEMORY_LIMIT=512M
    volumes:
      - ./laravel.env:/var/www/html/.env
      - ./laravel/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ./laravel/app/Providers/AppServiceProvider.php:/var/www/html/app/Providers/AppServiceProvider.php:ro
      - ./var/laravel_storage:/var/www/html/storage
      - ./var/variance_data:/var/www/html/storage/app/private/variance_data
      - ./var/uploads:/var/www/html/public/uploads
      - ./var/uploads_images:/var/www/html/public/uploads_images
      - ./var/uploads:/var/www/variance/uploads
      - ./var/uploads_images:/var/www/variance/uploads_images
      - ./var/uploads_pdf:/var/www/variance/uploads/pdf
    depends_on:
      - mariadb
      - redis
    ports:
      - 127.0.0.1:8001:8000

  laravel-queue:
    image: unillett/variance-input:laravel-stage-latest
    restart: unless-stopped
    command: ./scripts/run-queue-workers.sh
    env_file:
      - ./laravel.env
    environment:
      - PHP_MEMORY_LIMIT=512M
      - QUEUE_WORKERS=5
    volumes:
      - ./laravel.env:/var/www/html/.env
      - ./laravel/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ./laravel/app/Providers/AppServiceProvider.php:/var/www/html/app/Providers/AppServiceProvider.php:ro
      - ./var/laravel_storage:/var/www/html/storage
      - ./var/variance_data:/var/www/html/storage/app/private/variance_data
      - ./var/uploads:/var/www/html/public/uploads
      - ./var/uploads_images:/var/www/html/public/uploads_images
      - ./var/uploads:/var/www/variance/uploads
      - ./var/uploads_images:/var/www/variance/uploads_images
      - ./var/uploads_pdf:/var/www/variance/uploads/pdf
    depends_on:
      - mariadb
      - redis

  medite:
    image: unillett/variance-input:medite-stage-latest
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - FLASK_APP=flask_app.py
      - NLTK_DATA=/app/assets/nltk_data
    volumes:
      - ./var/uploads:/app/uploads
      - ./var/variance_data:/app/variance_data
      - ./var/laravel_storage/app/public:/app/storage_public
    depends_on:
      - redis

  variance-web:
    image: httpd:2.4
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./variance:/var/www
      - ./variance/docker/config/variance.conf:/usr/local/apache2/conf/httpd.conf
      - ./var/uploads:/var/www/uploads
      - ./var/uploads_images:/var/www/uploads_images
      - ./var/uploads_pdf:/var/www/uploads/pdf

  variance-app:
    image: unillett/variance:latest
    restart: unless-stopped
    env_file:
      - ./variance/.env
    volumes:
      - ./variance:/var/www
      - ./var/uploads:/var/www/uploads
      - ./var/uploads:/app/uploads
      - ./var/uploads_images:/var/www/uploads_images
      - ./var/uploads_pdf:/var/www/uploads/pdf
      - ./variance/docker/config/variance.ini:/usr/local/etc/php/conf.d/php.ini
    expose:
      - 9000

  variance-proxy:
    image: nginx:1.27
    restart: unless-stopped
    depends_on:
      - variance-web
      - laravel
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 127.0.0.1:8081:80

volumes:
  dbdata:

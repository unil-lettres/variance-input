# -------------------------------------------
# Projet Variance - Serveur de développement
# -------------------------------------------
name: variance
services:
  laravel:
    build:
      context: ./laravel
    container_name: laravel
    volumes:
      - ./laravel:/var/www/html
      - ./variance_data:/var/www/html/storage/app/private/variance_data
      - ./laravel/storage/app/public/uploads:/app/uploads
      - ./variance/uploads:/var/www/html/storage/app/public/uploads
    working_dir: /var/www/html
    environment:
      - PHP_MEMORY_LIMIT=512M
    ports:
      - "8000:8000"
    networks:
      - variance

  mariadb:
    image: mariadb:11.5.2
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: variance
      MYSQL_USER: variance_user
      MYSQL_PASSWORD: variance_password
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - variance

  medite:
    build:
      context: ./medite
    container_name: medite
    volumes:
      - ./medite/app:/app
      - ./variance_data:/app/variance_data
      - ./laravel/storage/app/public/uploads:/app/uploads
    working_dir: /app
    environment:
      - FLASK_ENV=development
      - FLASK_APP=flask_app.py
      - NLTK_DATA=/app/assets/nltk_data
    ports:
      - "5000:5000"
    depends_on:
      - redis
    networks:
      - variance

  redis:
    image: redis:7.0
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - variance

  saxon:
    build:
      context: ./saxon
    container_name: saxon
    volumes:
      - ./saxon/app:/app
    working_dir: /app
    networks:
      - variance

  variance-web:
    image: httpd:2.4
    working_dir: /var/www
    volumes:
      - ./variance/:/var/www
      - ./variance/docker/config/variance.conf:/usr/local/apache2/conf/httpd.conf
    ports:
      - "127.0.0.1:8282:80"
    networks:
      - variance
    container_name: variance-web
  variance-app:
    image: unillett/variance:latest
    build:
      context: ./variance/docker
      dockerfile: Dockerfile
    env_file:
      - ./variance/.env
    volumes:
      - ./variance/uploads:/var/www/uploads
      - ./variance/:/var/www
      - ./variance/docker/config/variance.ini:/usr/local/etc/php/conf.d/php.ini
    working_dir: /var/www
    expose:
      - "9000"
    networks:
      - variance
    container_name: variance-app

networks:
  variance:
    name: variance

volumes:
  dbdata:
